<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="csbf — a Brainfuck toolchain (interpreter, debugger, transpiler) running in the browser." />
    <title>csbf — Brainfuck playground</title>
    <base href="/" />
    <script>
        window.csbfTheme = {
            get: () => document.documentElement.getAttribute('data-bs-theme') || 'light',
            set: t => {
                document.documentElement.setAttribute('data-bs-theme', t);
                try { localStorage.setItem('theme', t); } catch (e) { }
            }
        };
        // Keep the current disassembly instruction visible as you step/run/back.
        window.csbfScrollToCurrentOp = () => {
            document.querySelector('.op-cur')?.scrollIntoView({ block: 'nearest' });
        };
        // Apply saved or OS-preferred theme immediately to avoid a flash.
        (() => {
            let saved = null;
            try { saved = localStorage.getItem('theme'); } catch (e) { }
            const t = saved || (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-bs-theme', t);
        })();
    </script>
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Csbf.Web.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
